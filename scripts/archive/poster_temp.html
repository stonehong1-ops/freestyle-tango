<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Class Poster</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            background: #111;
            font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }
        .poster {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .photo-area {
            width: 100%;
            height: 1100px;
            overflow: hidden;
            position: relative;
        }
        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 300px;
            background: linear-gradient(to bottom, transparent, #111);
        }
        .content-area {
            flex: 1;
            padding: 40px 60px;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background: #111;
        }
        .header-tag {
            position: absolute;
            top: 60px;
            left: 60px;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            padding: 8px 24px;
            font-weight: 700;
            font-size: 28px;
            border-radius: 4px;
            letter-spacing: 2px;
        }
        .title {
            font-size: 58px;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.3;
            word-break: keep-all;
        }
        .description {
            font-size: 32px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 50px;
            word-break: keep-all;
        }
        .details-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 20px 40px;
            font-size: 34px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 40px;
        }
        .label {
            font-weight: 400;
            color: #ff5e8e; /* Coral Accent */
        }
        .value {
            font-weight: 400;
            color: #fff;
        }
        .footer {
            margin-top: auto;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            padding-bottom: 40px;
        }
    </style>
</head>
<body>
    <div class="poster" id="poster">
        <div class="header-tag">특강</div>
        <div class="photo-area">
            <img src="file:///C:/Users/stone/.gemini/antigravity/brain/cfd9a4f4-df22-4ec1-83db-e82e60e33e22/media__1775004245921.png" alt="Aran">
            <div class="photo-overlay"></div>
        </div>
        <div class="content-area">
            <div class="title">오초 & 히로 :<br>코어 압력을 되찾아 회전력과 커넥션 업그레이드하기!</div>
            <div class="description">
                꼬임과 풀림, 연결과 늘림의 에너지가 온 몸을 꽉 채울 때, 얼마나 충만하고 온전하게 춤출 수 있는지 조금이나마 나눌 수 있길 바래요~♡
            </div>
            <div class="details-grid">
                <div class="label">일시</div>
                <div class="value">2026. 4. 1 WED | 7:40 - 9:40 PM</div>
                
                <div class="label">장소</div>
                <div class="value">프리스타일탱고 (마포구 양화로3길 55)</div>
                
                <div class="label">비용</div>
                <div class="value">30,000 KRW</div>
                
                <div class="label">강사</div>
                <div class="value">Aran (아란)</div>
            </div>
            <div class="footer">
                PREMIUM TANGO STUDIO | FREESTYLE TANGO
            </div>
        </div>
    </div>
</body>
</html>
